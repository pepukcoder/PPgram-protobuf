syntax = "proto3";

package ppgram;

option go_package = "github.com/ppgram/server/protomsg;protomsg";
option csharp_namespace = "PPgram.Protobuf";

message AuthRegisterRequest {
    string display_name = 1;
    string username = 2;
    string password = 3;
    string device_id = 4;
    string device_name = 5;
}

message AuthLoginByCredentialsRequest {
    string username = 1;
    string password = 2;
    string device_id = 3;
    string device_name = 4;
}

message AuthLoginByTokenRequest {
    string session_token = 1;
}

message AuthResponse {
    string session_token = 1;
}
