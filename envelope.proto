syntax = "proto3";

package ppgram;

option go_package = "github.com/ppgram/server/protomsg;protomsg";
option csharp_namespace = "PPgram.Protobuf";

message RequestEnvelope {
  string op = 1;
  optional bytes request = 2;
}

message ResponseEnvelope {
  uint32 status_code = 1;
  string message = 2;
  optional bytes response = 3;
}

message UpdateEnvelope {
    uint64 seq = 1;
    bool end = 2;
    bytes update = 3;
}
